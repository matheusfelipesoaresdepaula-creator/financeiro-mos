<style>
:root{
  --bg:#f5f0eb;
  --paper:#faf7f4;
  --soft:#ede5de;
  --line:#ddd4cb;
  --line-soft:#e4d9d0;
  --text:#1e0e08;
  --muted:#8a7568;
  --faint:#b5a898;
  --blue:#c0614f;
  --blue-dk:#7a3022;
  --blue-lt:#f5e8e4;
  --green:#1a8a6a;
  --red:#c83828;
  --amber:#c07820;
  --pink:#c44870;
  --violet:#7a3022;
  --radius:12px;
  --shadow:0 2px 8px rgba(30,14,8,.06),0 6px 20px rgba(30,14,8,.08);
  --shadow-sm:0 1px 3px rgba(30,14,8,.05),0 2px 6px rgba(30,14,8,.05);
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono:'DM Mono',monospace;
}
[data-theme="dark"]{
  --bg:#18100c;
  --paper:#241810;
  --soft:#2e1e16;
  --line:#3a2820;
  --line-soft:#322018;
  --text:#f0e8e2;
  --muted:#9a8880;
  --faint:#6a5850;
  --blue:#d4705c;
  --blue-dk:#a04030;
  --blue-lt:#3a2018;
  --green:#22b585;
  --red:#e05040;
  --amber:#d49040;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select{font:inherit}
button{cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.5}
input,select{min-width:0}
#root{min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.app{max-width:1120px;margin:0 auto;padding:20px 18px 32px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
.brand{display:flex;flex-direction:column;gap:2px}
.brand h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.brand p{font-size:12px;color:var(--muted);font-weight:400}
.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}

function toNumber(value){
  if (typeof value === "number") return value;
  let text = String(value ?? "").trim().replace(/[^\d,.-]/g,"");
  if (!text) return NaN;
  const lastComma = text.lastIndexOf(",");
  const lastDot = text.lastIndexOf(".");
  const decimalSep = lastComma > lastDot ? "," : (lastDot >= 0 ? "." : "");
  if (decimalSep) {
    const thousandsSep = decimalSep === "," ? "." : ",";
    text = text.split(thousandsSep).join("").replace(decimalSep,".");
  }
  return Number(text.replace(/(?!^)-/g,""));
}

function toInt(value,fallback=0){
  const n = parseInt(value,10);
  return Number.isFinite(n) ? n : fallback;
}

function roundMoney(value){
  return Math.round((Number(value || 0)+Number.EPSILON)*100)/100;
}

function moneyFromDigits(value){
  const digits = String(value ?? "").replace(/\D/g,"");
  return digits ? fmt(Number(digits)/100) : "";
}

function moneyDisplay(value){
  const n = toNumber(value);
  return Number.isFinite(n) && n > 0 ? fmt(n) : "";
}

function handleMoneyInput(input,target,key="valor"){
  const formatted = moneyFromDigits(input.value);
  input.value = formatted;

}

    .replace(/</g,"\\x3c")
    .replace(/>/g,"\\x3e")
    .replace(/&/g,"\\x26")
    .replace(/\n/g,"\\n")
    .replace(/\r/g,"")}'`;
}

function normalizeUser(raw,index){
  const isString = typeof raw === "string";
  const name = String(isString ? raw : (raw?.nome || raw?.name || raw?.label || `Usuário ${index+1}`)).trim() || `Usuário ${index+1}`;
  const fallback = DEFAULT_USERS[index]?.id || `u${index+1}`;
  const id = String(isString ? "" : (raw?.id || raw?.userId || raw?.value || "")).trim() || fallback;
  return {id,nome:name};
}

function normalizeUsers(rawUsers){
  const source = Array.isArray(rawUsers) && rawUsers.length ? rawUsers : DEFAULT_USERS;
  const seen = new Set();
  return source.map((raw,index)=>{
    const user = normalizeUser(raw,index);
    let id = user.id;
    let n = 2;
    while (seen.has(id)) id = `${user.id}_${n++}`;
    seen.add(id);
    return {...user,id};
  });
}

function normalizeTx(raw,fallbackUserId=DEFAULT_USERS[0].id){
  const id = raw?.id;
  if (id === undefined || id === null || String(id).trim() === "") return null;
  const tipo = raw.tipo === "receita" ? "receita" : raw.tipo === "investimento" ? "investimento" : "despesa";
  const valor = toNumber(raw.valor);
  return {
    id:String(id),
    userId:String(raw.userId || raw.usuarioId || raw.responsavelId || fallbackUserId),
    tipo,
    desc:String(raw.desc || ""),
    valor:Number.isFinite(valor) ? valor : 0,
    categoria:tipo === "investimento" ? "" : (raw.categoria || "Outros"),
    data:raw.data || today(),
    dataVenc:tipo === "investimento" ? "" : (raw.dataVenc || ""),
    situacao:raw.situacao || (tipo === "receita" ? "a_receber" : "a_pagar"),
    metodo:tipo === "investimento" ? "" : (raw.metodo || "Pix"),
    recorrGrupo:raw.recorrGrupo || "",
    cartaoId:raw.cartaoId || "",
    parcelaAtual:toInt(raw.parcelaAtual,0),
    totalParcelas:toInt(raw.totalParcelas,0),
    grupoParc:raw.grupoParc || "",
    valorTotal:Number.isFinite(toNumber(raw.valorTotal)) ? toNumber(raw.valorTotal) : 0,
    caixinhaId:tipo === "investimento" ? String(raw.caixinhaId || "") : "",
    subtipoInv:tipo === "investimento" ? (raw.subtipoInv === "resgate" ? "resgate" : "deposito") : "",
    updatedAt:raw.updatedAt || null,
  };
}

function normalizeCard(raw){
  if (!raw?.id) return null;
  return {
    id:String(raw.id),
    nome:String(raw.nome || ""),
    diaFech:toInt(raw.diaFech,1),
    diaVenc:toInt(raw.diaVenc,1),
    limite:Number.isFinite(toNumber(raw.limite)) ? toNumber(raw.limite) : 0,
    updatedAt:raw.updatedAt || null,
  };
}

function normalizeInvest(raw){
  if (!raw?.id) return null;
  return {
    id:String(raw.id),
    nome:String(raw.nome || ""),
    meta:Number.isFinite(toNumber(raw.meta)) ? toNumber(raw.meta) : 0,
    saldoAnterior:Number.isFinite(toNumber(raw.saldoAnterior)) ? toNumber(raw.saldoAnterior) : 0,
    updatedAt:raw.updatedAt || null,
  };
}

function normalizeSettings(raw){
  const base = defaultSettings();
  const categories = raw?.categories || {};
  const despesa = Array.from(new Set([...(categories.despesa || []), ...DEFAULT_CATEGORIES.despesa])).filter(Boolean);
  const receita = Array.from(new Set([...(categories.receita || []), ...DEFAULT_CATEGORIES.receita])).filter(Boolean);
  const users = normalizeUsers(raw?.users);
  const rawDefaultUserId = String(raw?.defaultUserId || "");
  const defaultUserId = users.some(u=>u.id === rawDefaultUserId) ? rawDefaultUserId : users[0].id;
  return {
    ...base,
    ...raw,
    dueDays:Math.max(1,Math.min(60,toInt(raw?.dueDays,7))),
    users,
    defaultUserId,
    categories:{despesa,receita},
  };
}

function sortTxs(txs){
  return txs.slice().sort((a,b)=>String(b.data).localeCompare(String(a.data)) || String(b.id).localeCompare(String(a.id),undefined,{numeric:true}));
}

function readLocal(key){
  try { return window.localStorage.getItem(key) || ""; }
  catch (err) { return ""; }
}

function writeLocal(key,payload){
  try { window.localStorage.setItem(key,JSON.stringify(payload)); }
  catch (err) { console.warn("Não foi possível salvar no navegador.",err); }
}

function loadState(){
  // Fonte única: Google Drive. Inicia sempre vazio; dados chegam via _autoLoadFromDrive.
  return {txs:[],cards:[],investments:[],settings:defaultSettings(),deletedTxIds:[]};
}

function persist(){
  const payload = {txs:sortTxs(STATE.txs),cards:STATE.cards,investments:STATE.investments,settings:STATE.settings,deletedTxIds:STATE.deletedTxIds};
  writeLocal(STORAGE_KEY,payload);
  STATE.dirty = true;
  scheduleSync();
}

function faturaYM(dataCompra,diaFechamento){
  const dia = Number(String(dataCompra).slice(8,10));
  return dia <= diaFechamento ? ym(dataCompra) : addM(ym(dataCompra),1);
}

// Mês que um lançamento ocupa no resumo: competência da fatura para compras de cartão
// (respeita o dia de fechamento), ou o mês da data para os demais lançamentos.
function txMonth(t){
  if (!t.cartaoId) return ym(t.data);
  const card = cardById(t.cartaoId);
  return card ? faturaYM(t.data,card.diaFech) : ym(t.data);
}

function getSit(t){
  if (t.tipo === "receita") return t.situacao || "a_receber";
  if (t.situacao === "pago") return "pago";
  if (t.dataVenc && t.dataVenc < today()) return "vencido";
  return t.situacao || "a_pagar";
}

function isDone(t){
  const s = getSit(t);
  return s === "pago" || s === "recebido";
}

function statusMeta(s){
  return {
    pago:["ok","Pago"],
    recebido:["ok","Recebido"],
    a_pagar:["info","A pagar"],
    a_receber:["warn","A receber"],
    vencido:["bad","Vencido"],
  }[s] || ["",s];
}

function cardById(id){
  return STATE.cards.find(c=>c.id === id) || null;
}

function cardName(id){
  return cardById(id)?.nome || "Cartão removido";
}

function investById(id){
  return STATE.investments.find(c=>c.id === id) || null;
}

function investName(id){
  return investById(id)?.nome || "Caixinha removida";
}

// Saldo global da caixinha (depósitos - resgates), somando TODOS os usuários,
// já que a caixinha é um "pote" compartilhado, igual ao limite de um cartão.
// O saldo anterior (montante que já existia antes do uso do app) entra como base
// fixa: soma ao guardado da caixinha, mas NÃO é um lançamento, então não interfere
// no saldo da conta (saldo efetivo/previsto).
// excludeTxId permite calcular "como se esta transação não existisse" (útil ao editar).
function investSaldoGlobal(caixinhaId,excludeTxId=null){
  const excludeId = excludeTxId !== null && excludeTxId !== undefined ? String(excludeTxId) : null;
  const base = investById(caixinhaId)?.saldoAnterior || 0;
  return STATE.txs.reduce((sum,t)=>{
    if (t.tipo !== "investimento" || t.caixinhaId !== caixinhaId) return sum;
    if (excludeId && t.id === excludeId) return sum;
    return sum + (t.subtipoInv === "resgate" ? -t.valor : t.valor);
  },base);
}

function categoryList(tipo,selected=""){
  const base = STATE.settings.categories[tipo] || DEFAULT_CATEGORIES[tipo] || [];
  return base.includes(selected) || !selected ? base : [selected,...base];
}

function userById(id){
  return (STATE.settings.users || []).find(u=>u.id === id) || null;
}

function defaultUserId(){
  const users = STATE.settings.users || DEFAULT_USERS;
  return userById(STATE.settings.defaultUserId)?.id || users[0]?.id || DEFAULT_USERS[0].id;
}

function userName(id){
  return userById(id)?.nome || "Usuário removido";
}

function normalizeUserView(value){
  return value === ALL_USERS || userById(value) ? value : defaultUserId();
}

function userViewLabel(){
  return STATE.userView === ALL_USERS ? "Ambos" : userName(STATE.userView);
}

function userOptionsHtml(selected,includeAll=false){
  const all = includeAll ? `<option value="${ALL_USERS}" ${selected === ALL_USERS ? "selected" : ""}>Ambos</option>` : "";
  const users = (STATE.settings.users || []).map(u=>`<option value="${esc(u.id)}" ${selected === u.id ? "selected" : ""}>${esc(u.nome)}</option>`).join("");
  return all + users;
}

function setUserView(value){
  STATE.userView = normalizeUserView(value);
  try { localStorage.setItem(USER_VIEW_KEY,STATE.userView); } catch(e) {}
  if (!STATE.editId && STATE.userView !== ALL_USERS) STATE.form.userId = STATE.userView;
  render();
}

function newTxUserId(){
  return STATE.userView !== ALL_USERS && userById(STATE.userView) ? STATE.userView : defaultUserId();
}

function txMatchesUser(t,userId=STATE.userView){
  return userId === ALL_USERS || t.userId === userId;
}

function visibleTxs(){
  return STATE.txs.filter(t=>txMatchesUser(t));
}

function calcDerived(){
  const txs = visibleTxs();
  const months = new Set(txs.map(t=>ym(t.data)));
  txs.filter(t=>t.cartaoId).forEach(t=>months.add(txMonth(t)));
  months.add(STATE.mesSel);
  const allMeses = Array.from(months).sort();

  const faturasPorMesCartao = {};
  txs.filter(t=>t.cartaoId).forEach(t=>{
    const month = txMonth(t);
    if (!faturasPorMesCartao[month]) faturasPorMesCartao[month] = {};
    if (!faturasPorMesCartao[month][t.cartaoId]) faturasPorMesCartao[month][t.cartaoId] = [];
    faturasPorMesCartao[month][t.cartaoId].push(t);
  });

  const saldoPorMes = {};
  allMeses.forEach(month=>{
    const normais = txs.filter(t=>ym(t.data) === month && !t.cartaoId && t.tipo !== "investimento");
    const investMes = txs.filter(t=>ym(t.data) === month && t.tipo === "investimento");
    const faturas = faturasPorMesCartao[month] || {};
    let receitas=0,despesas=0,recTot=0,despTot=0,depositos=0,resgates=0;
    normais.forEach(t=>{
      if (t.tipo === "receita") { recTot += t.valor; if (isDone(t)) receitas += t.valor; }
      else { despTot += t.valor; if (isDone(t)) despesas += t.valor; }
    });
    investMes.forEach(t=>{ if (t.subtipoInv === "resgate") resgates += t.valor; else depositos += t.valor; });
    Object.values(faturas).forEach(arr=>{
      const total = arr.reduce((s,t)=>s+t.valor,0);
      const pago = arr.filter(isDone).reduce((s,t)=>s+t.valor,0);
      despTot += total;
      despesas += pago;
    });
    saldoPorMes[month] = {receitas,despesas,saldoMes:receitas-despesas-depositos+resgates,recTot,despTot,depositos,resgates};
  });

  const saldoAcum = {};
  let acc = 0;
  allMeses.forEach(month=>{
    acc += saldoPorMes[month]?.saldoMes || 0;
    saldoAcum[month] = acc;
  });
  const idx = allMeses.indexOf(STATE.mesSel);
  const saldoAnt = idx > 0 ? saldoAcum[allMeses[idx-1]] || 0 : 0;
  const base = saldoPorMes[STATE.mesSel] || {receitas:0,despesas:0,saldoMes:0,recTot:0,despTot:0,depositos:0,resgates:0};
  const resumoMes = {...base,saldoFinal:STATE.consAnt ? base.saldoMes + saldoAnt : base.saldoMes};

  const txsMes = txs.filter(t=>ym(t.data) === STATE.mesSel && !t.cartaoId).sort((a,b)=>b.data.localeCompare(a.data));
  const faturasMes = faturasPorMesCartao[STATE.mesSel] || {};
  const porCat = categoryTotals(txs.filter(t=>txMonth(t) === STATE.mesSel && t.tipo === "despesa" && isDone(t)));
  const usoCartao = {};
  STATE.cards.forEach(c=>{
    usoCartao[c.id] = txs.filter(t=>t.cartaoId === c.id && !isDone(t)).reduce((s,t)=>s+t.valor,0);
  });
  const usoCaixinha = {};
  STATE.investments.forEach(inv=>{ usoCaixinha[inv.id] = investSaldoGlobal(inv.id); });

  return {txs,allMeses,faturasPorMesCartao,saldoPorMes,saldoAcum,saldoAnt,resumoMes,txsMes,faturasMes,porCat,usoCartao,usoCaixinha};
}

function categoryTotals(txs){
  const map = {};
  txs.forEach(t=>{ map[t.categoria] = (map[t.categoria] || 0) + t.valor; });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

function filteredTxs(){
  const f = STATE.filters;
  const q = f.q.trim().toLowerCase();
  return visibleTxs().filter(t=>{
    if (q && !`${t.desc} ${t.categoria} ${t.metodo} ${cardName(t.cartaoId)} ${userName(t.userId)}`.toLowerCase().includes(q)) return false;
    if (f.mes !== "todos" && ym(t.data) !== f.mes) return false;
    if (f.tipo !== "todos" && t.tipo !== f.tipo) return false;
    if (f.status !== "todos" && getSit(t) !== f.status) return false;
    if (f.categoria && t.categoria !== f.categoria) return false;
    if (f.metodo && t.metodo !== f.metodo) return false;
    if (f.cartao === "sem" && t.cartaoId) return false;
    if (f.cartao && f.cartao !== "sem" && t.cartaoId !== f.cartao) return false;
    return true;
  });
}

function dueAlerts(){
  const limit = addDays(today(),STATE.settings.dueDays);
  return visibleTxs()
    .filter(t=>!isDone(t) && t.dataVenc && t.dataVenc <= limit)
    .sort((a,b)=>a.dataVenc.localeCompare(b.dataVenc));
}

      <button class="${STATE.aba==="historico"?"active":""}" onclick="setAba('historico')"><span class="bn-icon">📋</span>Histórico</button>

function renderDashboard(d){
  const r = d.resumoMes;
  // A receber/A pagar = parcela ainda pendente (total previsto menos o que já foi efetivado).
  const aReceber = r.recTot - r.receitas;
  const aPagar = r.despTot - r.despesas;
  // Saldo previsto = saldo efetivo projetando o que ainda está a receber/a pagar.
  // Herda o saldo anterior do saldo efetivo (r.saldoFinal já o considera quando ativado).
  const saldoPrevisto = r.saldoFinal + aReceber - aPagar;
  const alerts = dueAlerts();
  const alertHtml = alerts.length ? `
    <section class="panel">
      <div class="row between">
        <h2 class="section-title">Vencimentos</h2>
        <span class="chip warn">${alerts.length} pendente${alerts.length === 1 ? "" : "s"}</span>
      </div>
      ${alerts.slice(0,6).map(t=>{
        const overdue = t.dataVenc < today();
        return `<div class="alert-item">
          <div>
            <strong style="font-size:13px">${esc(t.desc)}</strong>
            <p class="muted" style="font-size:12px">${esc(t.categoria)} · ${esc(t.metodo)} · vence ${fmtD(t.dataVenc)}</p>
          </div>
          <span class="chip ${overdue ? "bad" : "warn"}">${overdue ? "Vencido" : fmt(t.valor)}</span>
        </div>`;
      }).join("")}
    </section>` : "";
  const saldoAnt = STATE.consAnt && d.saldoAnt !== 0 ? ` ${fmt(d.saldoAnt)}` : "";

  const despesasMes = d.txs.filter(t=>txMonth(t) === STATE.mesSel && t.tipo === "despesa" && isDone(t));
  const receitasMes = d.txs.filter(t=>txMonth(t) === STATE.mesSel && t.tipo === "receita" && isDone(t));
  const despCatTop5 = categoryTotals(despesasMes).slice(0,5);
  const recCatTop5 = categoryTotals(receitasMes).slice(0,5);
  const despMax = despCatTop5[0]?.[1] || 1;
  const recMax = recCatTop5[0]?.[1] || 1;

  const cardsTop5 = STATE.cards.slice().sort((a,b)=>(d.usoCartao[b.id]||0)-(d.usoCartao[a.id]||0)).slice(0,5);
  const cardUsoMax = Math.max(1,...cardsTop5.map(c=>d.usoCartao[c.id]||0));
  if (!STATE.dashCartaoSel || !cardById(STATE.dashCartaoSel)) STATE.dashCartaoSel = STATE.cards[0]?.id || "";
  const cartaoSel = cardById(STATE.dashCartaoSel);
  const comprasCartaoSel = cartaoSel
    ? d.txs.filter(t=>t.cartaoId === cartaoSel.id && txMonth(t) === STATE.mesSel).slice().sort((a,b)=>b.valor-a.valor).slice(0,5)
    : [];

  const mesesEvo = d.allMeses.filter(m=>m <= STATE.mesSel).slice(-6);
  const recValues = mesesEvo.map(m=>d.saldoPorMes[m]?.recTot || 0);
  const despValues = mesesEvo.map(m=>d.saldoPorMes[m]?.despTot || 0);

  return `
    <div class="row wrap" style="margin-bottom:12px">
      <label class="chip" style="cursor:pointer"><input type="checkbox" ${STATE.consAnt ? "checked" : ""} onchange="STATE.consAnt=this.checked;render()"/> Considerar saldo anterior${saldoAnt}</label>
      <span class="chip">Pagos e recebidos no saldo efetivo</span>
      ${r.depositos > 0 ? `<span class="chip info">-${fmt(r.depositos)} em depósitos</span>` : ""}
      ${r.resgates > 0 ? `<span class="chip ok">+${fmt(r.resgates)} em resgates</span>` : ""}
    </div>
    <section class="grid cols-3 metrics" style="margin-bottom:14px">
      ${metric("Saldo efetivo",r.saldoFinal,r.saldoFinal >= 0 ? "pos" : "neg")}
      ${metric("Recebido",r.receitas,"pos")}
      ${metric("Pago",r.despesas,"neg")}
    </section>
    <section class="grid cols-3 metrics" style="margin-bottom:14px">
      ${metric("Saldo previsto",saldoPrevisto,saldoPrevisto >= 0 ? "pos" : "neg",true)}
      ${metric("A receber",aReceber,"pos",true)}
      ${metric("A pagar",aPagar,"neg",true)}
    </section>
    ${alertHtml ? `<div style="margin-bottom:12px">${alertHtml}</div>` : ""}
    <div class="grid cols-3" style="margin-bottom:16px">
      <section class="panel">
        <h2 class="section-title">Despesas por categoria</h2>
        ${despCatTop5.length ? despCatTop5.map(([cat,val],i)=>barLine(cat,val,val/despMax,COLORS[i%COLORS.length])).join("") : empty("Sem despesas neste mês.")}
      </section>
      <section class="panel">
        <h2 class="section-title">Receitas por categoria</h2>
        ${recCatTop5.length ? recCatTop5.map(([cat,val],i)=>barLine(cat,val,val/recMax,COLORS[i%COLORS.length])).join("") : empty("Sem receitas neste mês.")}
      </section>
      <section class="panel">
        <div class="row between" style="margin-bottom:12px">
          <h2 class="section-title" style="margin:0">Uso por cartão</h2>
          ${STATE.cards.length ? `<select class="input white" style="width:auto;font-size:12px;padding:5px 8px" onchange="STATE.dashCartaoSel=this.value;render()">
            ${STATE.cards.map(c=>`<option value="${esc(c.id)}" ${STATE.dashCartaoSel===c.id?"selected":""}>${esc(c.nome)}</option>`).join("")}
          </select>` : ""}
        </div>
        ${cardsTop5.length ? cardsTop5.map((c,i)=>barLine(c.nome,d.usoCartao[c.id]||0,(d.usoCartao[c.id]||0)/cardUsoMax,CARD_COLORS[i%CARD_COLORS.length])).join("") : empty("Nenhum cartão cadastrado.")}
        ${cartaoSel ? `
          <p class="muted" style="font-size:12px;margin-top:14px;border-top:1px solid var(--line-soft);padding-top:10px">Maiores compras · ${esc(cartaoSel.nome)}</p>

function lineAreaChart(meses,recValues,despValues){
  const w = 600, h = 150, padL = 10, padR = 10, padTop = 14, padBottom = 28;
  const innerW = w - padL - padR;
  const baseline = h - padBottom;
  const maxVal = Math.max(1,...recValues,...despValues);
  const n = meses.length;
  const stepX = n > 1 ? innerW/(n-1) : 0;
  const xAt = i => padL + stepX*i;
  const yAt = v => baseline - (v/maxVal)*(baseline-padTop);
  const pts = arr => arr.map((v,i)=>`${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(" ");
  const recPts = pts(recValues);
  const despPts = pts(despValues);
  const recArea = `${recPts} ${xAt(n-1).toFixed(1)},${baseline} ${xAt(0).toFixed(1)},${baseline}`;
  const despArea = `${despPts} ${xAt(n-1).toFixed(1)},${baseline} ${xAt(0).toFixed(1)},${baseline}`;
  const dots = (arr,color) => arr.map((v,i)=>{
    const last = i === n-1;
    return `<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(v).toFixed(1)}" r="${last?4.5:3.5}" fill="${color}"${last ? ' stroke="#fff" stroke-width="1.5"' : ""}/>`;
  }).join("");
  const labels = meses.map((m,i)=>{
    const last = i === n-1;
    return `<text x="${xAt(i).toFixed(1)}" y="${h-8}" font-size="11" fill="${last ? "var(--text)" : "var(--muted)"}" font-weight="${last?"650":"400"}" text-anchor="middle">${esc(monthLabel(m).split(" ")[0])}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" role="img" aria-label="Evolução de receitas e despesas nos últimos meses">
    <line x1="${padL}" y1="${baseline}" x2="${w-padR}" y2="${baseline}" stroke="var(--line-soft)" stroke-width="1"/>
    <polygon points="${recArea}" fill="var(--green)" opacity="0.1"/>
    <polygon points="${despArea}" fill="var(--red)" opacity="0.1"/>
    <polyline points="${recPts}" fill="none" stroke="var(--green)" stroke-width="2.5"/>
    <polyline points="${despPts}" fill="none" stroke="var(--red)" stroke-width="2.5"/>
    ${dots(recValues,"var(--green)")}
    ${dots(despValues,"var(--red)")}
    ${labels}
  </svg>`;
}

function startInvestAdd(){

  STATE.investForm = emptyInvestForm();
  STATE.investErro = "";
  STATE.showInvestForm = true;

}

function startInvestEdit(id){
  const inv = investById(id);
  if (!inv) return;
  STATE.investEditId = id;
  STATE.investForm = {nome:inv.nome,meta:inv.meta ? moneyDisplay(inv.meta) : "",saldoAnterior:inv.saldoAnterior ? moneyDisplay(inv.saldoAnterior) : ""};
  STATE.investErro = "";
  STATE.showInvestForm = true;
  STATE.aba = "investimentos";
  render();
}

function cancelInvestForm(){
  STATE.investEditId = null;
  STATE.investForm = emptyInvestForm();
  STATE.investErro = "";
  STATE.showInvestForm = false;
  render();
}

function saveInvest(){
  const f = STATE.investForm;
  const nome = f.nome.trim();
  const metaRaw = f.meta === "" ? 0 : toNumber(f.meta);
  const saldoAntRaw = f.saldoAnterior === "" ? 0 : toNumber(f.saldoAnterior);
  if (!nome) { STATE.investErro = "Informe o nome."; render(); return; }
  if (!Number.isFinite(metaRaw) || metaRaw < 0) { STATE.investErro = "Informe uma meta válida (ou deixe em branco)."; render(); return; }
  if (!Number.isFinite(saldoAntRaw) || saldoAntRaw < 0) { STATE.investErro = "Informe um saldo anterior válido (ou deixe em branco)."; render(); return; }
  const inv = {id:STATE.investEditId || makeId("inv"),nome,meta:metaRaw,saldoAnterior:saldoAntRaw};
  if (STATE.investEditId) {
    const idx = STATE.investments.findIndex(c=>c.id === STATE.investEditId);
    if (idx >= 0) STATE.investments[idx] = inv;
  } else {
    STATE.investments.push(inv);
  }
  persist();
  cancelInvestForm();
}

function deleteInvest(id){
  const saldo = investSaldoGlobal(id);
  const aviso = Math.abs(saldo) > 0.005
    ? `Esta caixinha ainda tem ${fmt(saldo)} guardado. Excluir mesmo assim? O histórico de lançamentos será preservado, mas a caixinha não aparecerá mais na lista.`
    : "Excluir esta caixinha?";
  if (!confirm(aviso)) return;
  STATE.investments = STATE.investments.filter(c=>c.id !== id);
  if (STATE.investDetalhe === id) STATE.investDetalhe = null;
  persist();
  render();
}


// ── GOOGLE DRIVE SYNC ────────────────────────────────────────────────────────

function fmtDatetime(iso){
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function _gMsg(msg, type="ok"){
  GAUTH.msg = msg; GAUTH.msgType = type;
  render();
  if (type === "ok") setTimeout(()=>{ GAUTH.msg=""; render(); }, 4000);
}

function tryInitGoogleAuth(attempts=0){
  if (window.google?.accounts?.oauth2){
    GAUTH.tokenClient = window.google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope:     DRIVE_SCOPE,
      callback:  _handleGToken,
    });
    // Tenta autenticação silenciosa se já logou antes
    if (GAUTH.email){
      GAUTH.tokenClient.requestAccessToken({prompt:"none", hint: GAUTH.email});
    }
  } else if (attempts < 25){
    setTimeout(()=>tryInitGoogleAuth(attempts+1), 300);
  }
}

async function _handleGToken(resp){
  if (resp.error || !resp.access_token){
    // Falha silenciosa esperada quando usuário ainda não autorizou
    GAUTH.signedIn = false; render(); return;
  }
  GAUTH.accessToken = resp.access_token;
  GAUTH.signedIn    = true;
  // Busca e-mail do usuário
  try {
    const r = await fetch("https://www.googleapis.com/oauth2/v2/userinfo",
      {headers:{Authorization:`Bearer ${resp.access_token}`}});
    const info = await r.json();
    GAUTH.email = info.email || GAUTH.email;
    localStorage.setItem("cf_g_email", GAUTH.email);
  } catch(e){}
  // Auto-carrega do Drive após login
  await _autoLoadFromDrive();
  render();
}

function googleSignIn(){
  if (!GAUTH.tokenClient){
    alert("Biblioteca Google ainda carregando. Aguarde alguns segundos e tente novamente.");
    return;
  }
  GAUTH.tokenClient.requestAccessToken({prompt:"", hint: GAUTH.email || ""});
}

function googleSignOut(){
  if (GAUTH.accessToken && window.google?.accounts?.oauth2){
    window.google.accounts.oauth2.revoke(GAUTH.accessToken, ()=>{});
  }
  GAUTH.accessToken = null;
  GAUTH.signedIn    = false;
  GAUTH.msg         = "";
  render();
}

async function _driveReq(url, opts={}){
  if (!GAUTH.accessToken) return null;
  const resp = await fetch(url, {
    ...opts,
    headers:{Authorization:`Bearer ${GAUTH.accessToken}`, ...(opts.headers||{})},
  });
  if (resp.status === 401){
    GAUTH.signedIn = false; GAUTH.accessToken = null;
    _gMsg("Sessão expirada. Clique em Reconectar.", "err");
    return null;
  }
  return resp;
}

async function _findFile(){
  const q = encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
  const r = await _driveReq(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,modifiedTime)&spaces=drive`);
  if (!r) return null;
  const d = await r.json();
  const files = d.files || [];
  if (!files.length) return null;
  files.sort((a,b)=>new Date(b.modifiedTime)-new Date(a.modifiedTime));
  return files[0];
}

async function _writeFile(content, fileId=null){
  const boundary = "cfb_" + Date.now();
  const body = [
    `--${boundary}`,
    "Content-Type: application/json; charset=UTF-8",
    "",
    JSON.stringify({name:DRIVE_FILENAME, mimeType:"application/json"}),
    `--${boundary}`,
    "Content-Type: application/json",
    "",
    JSON.stringify(content),
    `--${boundary}--`,
  ].join("\r\n");
  const url = fileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const r = await _driveReq(url, {
    method: fileId ? "PATCH" : "POST",
    headers:{"Content-Type":`multipart/related; boundary=${boundary}`},
    body,
  });
  return r ? r.json() : null;
}

function mergeSettings(localSettings,remoteSettings){
  const local = normalizeSettings(localSettings);
  const remote = normalizeSettings(remoteSettings);
  const users = [];
  const userMap = new Map();
  [...remote.users,...local.users].forEach(u=>{
    if (!userMap.has(u.id)) users.push(u);
    userMap.set(u.id,u);
  });
  const mergedUsers = users.map(u=>userMap.get(u.id));
  const despesa = Array.from(new Set([...(remote.categories.despesa || []), ...(local.categories.despesa || [])])).filter(Boolean);
  const receita = Array.from(new Set([...(remote.categories.receita || []), ...(local.categories.receita || [])])).filter(Boolean);
  const defaultUserId = mergedUsers.some(u=>u.id === local.defaultUserId) ? local.defaultUserId : (mergedUsers[0]?.id || DEFAULT_USERS[0].id);
  return {...local,users:mergedUsers,defaultUserId,categories:{despesa,receita}};
}

function mergeData(localData,remoteData){
  const settings = mergeSettings(localData.settings,remoteData?.settings);

  // Tombstones: union of deleted IDs from both sides
  const deletedIds = new Set([...(localData.deletedTxIds||[]),...(remoteData?.deletedTxIds||[])]);

  const cardMap = new Map();
  (remoteData?.cards||[]).map(normalizeCard).filter(Boolean).forEach(c=>cardMap.set(c.id,c));
  (localData.cards||[]).map(normalizeCard).filter(Boolean).forEach(c=>cardMap.set(c.id,c));

  const investMap = new Map();
  (remoteData?.investments||[]).map(normalizeInvest).filter(Boolean).forEach(c=>investMap.set(c.id,c));
  (localData.investments||[]).map(normalizeInvest).filter(Boolean).forEach(c=>investMap.set(c.id,c));

  // Merge: para conflitos de mesmo ID, o mais recente (updatedAt) vence.
  // Transações novas (IDs únicos) são sempre preservadas dos dois lados.
  const txMap = new Map();
  (remoteData?.txs||[]).map(t=>normalizeTx(t,settings.defaultUserId)).filter(Boolean).forEach(t=>txMap.set(t.id,t));
  (localData.txs||[]).map(t=>normalizeTx(t,settings.defaultUserId)).filter(Boolean).forEach(t=>{
    const existing = txMap.get(t.id);
    if (!existing){ txMap.set(t.id,t); return; }
    const remoteTs = existing.updatedAt ? new Date(existing.updatedAt).getTime() : 0;
    const localTs  = t.updatedAt       ? new Date(t.updatedAt).getTime()        : 0;
    if (localTs >= remoteTs) txMap.set(t.id,t);
  });

  // Remove tombstoned transactions from both sides
  deletedIds.forEach(id=>txMap.delete(id));

  return {
    txs:sortTxs(Array.from(txMap.values())),
    cards:Array.from(cardMap.values()),
    investments:Array.from(investMap.values()),
    settings,
    deletedTxIds:Array.from(deletedIds),
  };
}

async function syncToDrive(){
  if (!GAUTH.signedIn){ googleSignIn(); return; }
  GAUTH.syncing = true; render();
  try {
    if (!GAUTH.fileId){
      const f = await _findFile();
      if (f) { GAUTH.fileId = f.id; localStorage.setItem("cf_g_file_id", f.id); }
    }
    // Drive é a única fonte de verdade: salva o estado atual diretamente, sem mesclar.
    const payload = {
      version:1, savedAt:new Date().toISOString(),
      txs:sortTxs(STATE.txs), cards:STATE.cards, investments:STATE.investments, settings:STATE.settings, deletedTxIds:STATE.deletedTxIds,
    };
    const result = await _writeFile(payload, GAUTH.fileId||null);
    if (!result) throw new Error("Resposta inválida do Drive");
    GAUTH.fileId   = result.id;
    GAUTH.lastSync = new Date().toISOString();
    localStorage.setItem("cf_g_file_id",    GAUTH.fileId);
    localStorage.setItem("cf_g_last_sync",  GAUTH.lastSync);
    STATE.dirty = false;
    _gMsg("Salvo no Google Drive ✓");
  } catch(e){
    _gMsg("Erro ao salvar: "+e.message, "err");
  } finally {
    GAUTH.syncing = false; render();
  }
}

async function _fetchDriveData(){
  let fileId = GAUTH.fileId;
  if (!fileId){
    const f = await _findFile();
    if (!f) return null;
    fileId = f.id;
    GAUTH.fileId = fileId;
    localStorage.setItem("cf_g_file_id", fileId);
  }
  const r = await _driveReq(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  if (!r) return null;
  const data = await r.json();
  return data;
}

async function _applyDriveData(data){
  if (!data) throw new Error("Sem dados retornados.");
  if (!data.txs && !data.cards) throw new Error("Arquivo não reconhecido.");
  const settings = normalizeSettings(data.settings);
  STATE.txs          = sortTxs((data.txs||[]).map(t=>normalizeTx(t,settings.defaultUserId)).filter(Boolean));
  STATE.cards        = (data.cards||[]).map(normalizeCard).filter(Boolean);
  STATE.investments  = (data.investments||[]).map(normalizeInvest).filter(Boolean);
  STATE.settings     = settings;
  STATE.deletedTxIds = Array.isArray(data.deletedTxIds) ? data.deletedTxIds : [];
  const deletedSet   = new Set(STATE.deletedTxIds);
  STATE.txs          = STATE.txs.filter(t=>!deletedSet.has(t.id));
  STATE.userView = normalizeUserView(STATE.userView);
  if (!userById(STATE.form.userId)) STATE.form.userId = newTxUserId();
  persist();
  STATE.dirty  = false;
  GAUTH.lastSync = new Date().toISOString();
  localStorage.setItem("cf_g_last_sync", GAUTH.lastSync);
}

async function _autoLoadFromDrive(){
  GAUTH.syncing = true; render();
  try {
    const remoteData = await _fetchDriveData();
    if (!remoteData){
      _gMsg("Conectado ao Google ✓ — nenhum dado salvo no Drive ainda.", "ok");
      return;
    }
    // Drive é a única fonte de verdade: aplica diretamente, sem mesclar com local.
    await _applyDriveData(remoteData);
    _gMsg(`Dados carregados do Drive ✓ — ${STATE.txs.length} lançamento(s).`);
  } catch(e){
    _gMsg("Erro ao carregar do Drive: " + e.message, "err");
  } finally {
    GAUTH.syncing = false; render();
  }
}

async function syncFromDrive(){
  if (!GAUTH.signedIn){ googleSignIn(); return; }
  if (!confirm("Substituir dados locais pelos dados do Google Drive?")) return;
  GAUTH.syncing = true; render();
  try {
    const data = await _fetchDriveData();
    if (!data) throw new Error("Nenhum arquivo encontrado no Drive.");
    await _applyDriveData(data);
    _gMsg("Dados carregados do Drive ✓");
  } catch(e){
    _gMsg("Erro ao carregar: " + e.message, "err");
  } finally {
    GAUTH.syncing = false; render();
  }
}

  const userOptions = userOptionsHtml(form.userId,false);
  const value = toNumber(form.valor);
  const parcels = Array.from({length:24},(_,i)=>i+1).map(n=>{
    const label = n > 1 && Number.isFinite(value) && value > 0 ? ` de ${fmt(value/n)}` : "";
    return `<option value="${n}" ${form.parcelas == n ? "selected" : ""}>${n}x${label}</option>`;
  }).join("");
  let preview = "";
  if (isCard && form.cartaoId && form.data) {
    const card = cardById(form.cartaoId);
    if (card) preview = `<p class="footer-note">Fatura de ${monthLabel(faturaYM(form.data,card.diaFech))} · vence dia ${card.diaVenc}</p>`;
  }
  const caixinhaSel = isInvest ? investById(form.caixinhaId) : null;
  const saldoCaixinhaSel = caixinhaSel ? investSaldoGlobal(caixinhaSel.id,STATE.editId) : 0;
  const recBase = ym(form.data || today());
  const recAte = (form.recorrAte && form.recorrAte >= recBase) ? form.recorrAte : addM(recBase,5);
  const recCount = Math.max(1,monthsBetween(recBase,recAte));
  return `<section class="panel">
    <div class="seg" style="margin-bottom:14px">
      <button class="${form.tipo === "despesa" ? "active" : ""}" onclick="setTipo('despesa')">Despesa</button>
      <button class="${form.tipo === "receita" ? "active" : ""}" onclick="setTipo('receita')">Receita</button>
      <button class="${isInvest ? "active" : ""}" onclick="setTipo('investimento')">Investimento</button>
    </div>
    ${isInvest ? `<div class="seg" style="margin-bottom:14px">
      <button class="${form.subtipoInv !== "resgate" ? "active" : ""}" onclick="setSubtipoInv('deposito')">Depósito</button>
      <button class="${form.subtipoInv === "resgate" ? "active" : ""}" onclick="setSubtipoInv('resgate')">Resgate</button>
    </div>` : ""}
    <div class="grid cols-2">
      <div class="field" style="grid-column:1/-1"><label>Descrição</label><input class="input" placeholder="${isInvest ? "Ex: Reserva de emergência" : "Ex: Aluguel, Salário..."}" value="${esc(form.desc)}" oninput="STATE.form.desc=this.value"/></div>
      <div class="field"><label>Valor</label><input class="input" inputmode="numeric" placeholder="R$ 0,00" value="${esc(moneyDisplay(form.valor))}" oninput="handleMoneyInput(this, STATE.form)"/></div>
      <div class="field"><label>Data</label><input class="input" type="date" value="${form.data}" oninput="STATE.form.data=this.value" onchange="STATE.form.data=this.value;render()"/></div>
      <div class="field"><label>Responsável</label><select class="input" onchange="STATE.form.userId=this.value">${userOptions}</select></div>
      ${isInvest ? `<div class="field"><label>Caixinha</label><select class="input" onchange="STATE.form.caixinhaId=this.value;render()">
          <option value="">Selecione</option>
          ${STATE.investments.map(c=>`<option value="${esc(c.id)}" ${form.caixinhaId===c.id?"selected":""}>${esc(c.nome)}</option>`).join("")}
        </select></div>` : `
      <div class="field"><label>Categoria</label><select class="input" onchange="STATE.form.categoria=this.value">${cats.map(c=>`<option value="${esc(c)}" ${form.categoria===c?"selected":""}>${esc(c)}</option>`).join("")}</select></div>
      <div class="field"><label>Método</label><select class="input" onchange="STATE.form.metodo=this.value;STATE.form.cartaoId='';STATE.form.parcelas=1;render()">${methods.map(m=>`<option value="${m}" ${form.metodo===m?"selected":""}>${m}</option>`).join("")}</select></div>`}
    </div>
    ${isInvest && !STATE.investments.length ? `<p class="footer-note">Você ainda não tem caixinhas. <a href="#" onclick="event.preventDefault();setAba('investimentos')" style="color:var(--blue)">Criar uma caixinha</a> primeiro.</p>` : ""}
    ${isInvest && caixinhaSel ? `<p class="footer-note">Saldo atual da caixinha: <strong>${fmt(saldoCaixinhaSel)}</strong>${caixinhaSel.meta > 0 ? ` de ${fmt(caixinhaSel.meta)}` : ""}</p>` : ""}
    ${isInvest ? "" : isCard ? `<div class="panel tight" style="margin-top:12px;background:var(--bg)">
      <div class="grid cols-2">
        <div class="field"><label>Cartão</label><select class="input white" onchange="STATE.form.cartaoId=this.value;render()"><option value="">Selecione</option>${STATE.cards.map(c=>`<option value="${c.id}" ${form.cartaoId===c.id?"selected":""}>${esc(c.nome)}</option>`).join("")}</select></div>
        <div class="field"><label>Parcelas</label><select class="input white" onchange="STATE.form.parcelas=parseInt(this.value);render()">${parcels}</select></div>
      </div>${preview}
    </div>` : `<div class="grid cols-2" style="margin-top:12px">
      <div class="field"><label>Situação</label><select class="input" onchange="STATE.form.situacao=this.value">${form.tipo === "receita" ? `<option value="a_receber" ${form.situacao==="a_receber"?"selected":""}>A receber</option><option value="recebido" ${form.situacao==="recebido"?"selected":""}>Recebido</option>` : `<option value="a_pagar" ${form.situacao==="a_pagar"?"selected":""}>A pagar</option><option value="pago" ${form.situacao==="pago"?"selected":""}>Pago</option>`}</select></div>
      <div class="field"><label>Vencimento</label><input class="input" type="date" value="${form.dataVenc}" oninput="STATE.form.dataVenc=this.value"/></div>
    </div>`}
    ${!STATE.editId && !isCard ? `<div class="panel tight" style="margin-top:12px;background:var(--bg)">
      <label class="row" style="font-weight:650"><input type="checkbox" ${form.recorrente ? "checked" : ""} onchange="STATE.form.recorrente=this.checked;render()"/> Lançamento recorrente</label>
      ${form.recorrente ? `<div class="field" style="margin-top:10px">
        <label>Repetir até</label>
        <input class="input white" type="month" min="${recBase}" value="${recAte}" oninput="STATE.form.recorrAte=this.value;render()"/>
        <p class="footer-note" style="margin-top:6px">De ${monthLabel(recBase)} até ${monthLabel(recAte)} · ${recCount} ${recCount === 1 ? "lançamento" : "lançamentos"}.</p>
      </div>` : ""}
    </div>` : ""}
    ${STATE.erro ? `<p class="neg" style="font-size:13px;margin-top:10px">${esc(STATE.erro)}</p>` : ""}
    <div class="row" style="margin-top:14px">
      ${STATE.editId ? `<button class="btn ghost" onclick="cancelEdit()">Cancelar</button>` : ""}
      <button class="btn primary" onclick="saveTx()">${STATE.editId ? "Salvar alterações" : isCard ? `Lançar ${form.parcelas}x` : form.recorrente ? `Criar ${recCount} lançamentos` : isInvest ? (form.subtipoInv === "resgate" ? "Resgatar" : "Depositar") : "Adicionar"}</button>
    </div>
  </section>`;

function setAba(id){
  STATE.aba = id;
  if (id !== "nova") { STATE.editId = null; STATE.form = emptyForm(newTxUserId()); STATE.erro = ""; }
  render();
}

function setTipo(tipo){
  STATE.form = {
    ...STATE.form,
    tipo,
    categoria:tipo === "investimento" ? "" : categoryList(tipo)[0],
    situacao:tipo === "receita" ? "a_receber" : tipo === "investimento" ? "" : "a_pagar",
    metodo:tipo === "investimento" ? "" : "Pix",
    cartaoId:"",
    parcelas:1,
    caixinhaId:tipo === "investimento" ? (STATE.form.caixinhaId || STATE.investments[0]?.id || "") : "",
    subtipoInv:tipo === "investimento" ? (STATE.form.subtipoInv || "deposito") : "deposito",
  };
  render();
}

function setSubtipoInv(subtipo){
  STATE.form.subtipoInv = subtipo;
  render();
}

function saveTx(){
  const form = STATE.form;
  const desc = form.desc.trim();
  const valor = toNumber(form.valor);
  if (!desc) { STATE.erro = "Informe uma descrição."; render(); return; }
  if (!Number.isFinite(valor) || valor <= 0) { STATE.erro = "Informe um valor válido."; render(); return; }
  if (!form.data) { STATE.erro = "Informe uma data."; render(); return; }
  if (!userById(form.userId)) { STATE.erro = "Selecione o responsável."; render(); return; }
  if (form.metodo === "Cartão de crédito" && !form.cartaoId) { STATE.erro = "Selecione o cartão."; render(); return; }
  if (form.tipo === "investimento") {
    if (!form.caixinhaId || !investById(form.caixinhaId)) { STATE.erro = "Selecione a caixinha."; render(); return; }
    if (form.subtipoInv === "resgate") {
      const saldoAtual = investSaldoGlobal(form.caixinhaId,STATE.editId);
      if (valor > saldoAtual + 0.005) {
        STATE.erro = `Saldo insuficiente na caixinha. Disponível: ${fmt(saldoAtual)}.`;
        render();
        return;
      }
    }
  }

  if (STATE.editId) {
    const idx = STATE.txs.findIndex(t=>t.id === String(STATE.editId));
    if (idx >= 0) STATE.txs[idx] = normalizeTx({...STATE.txs[idx],...form,desc,valor,id:STATE.editId,updatedAt:new Date().toISOString()});
  } else {
    addTxsFromForm({...form,desc,valor});
  }
  STATE.txs = sortTxs(STATE.txs);
  persist();
  STATE.form = emptyForm(newTxUserId());
  STATE.editId = null;
  STATE.erro = "";
  STATE.aba = "dashboard";
  render();
}

function addTxsFromForm(form){
  const nextId = () => nextTxId();
  if (form.metodo === "Cartão de crédito") {
    const card = cardById(form.cartaoId);
    const parcelas = Math.max(1,toInt(form.parcelas,1));
    const valorParcela = roundMoney(form.valor / parcelas);
    const base = faturaYM(form.data,card.diaFech);
    const grupo = makeId("p");
    for (let i=0;i<parcelas;i++) {
      const month = addM(base,i);
      STATE.txs.push({
        id:nextId(),
        userId:form.userId,
        tipo:"despesa",
        desc:form.desc,
        valor:valorParcela,
        categoria:form.categoria,
        data:`${month}-01`,
        dataVenc:`${month}-${String(card.diaVenc).padStart(2,"0")}`,
        situacao:i === 0 ? form.situacao || "a_pagar" : "a_pagar",
        metodo:"Cartão de crédito",
        cartaoId:form.cartaoId,
        parcelaAtual:i+1,
        totalParcelas:parcelas,
        grupoParc:grupo,
        valorTotal:form.valor,
        recorrGrupo:"",
        updatedAt:new Date().toISOString(),
      });
    }
    return;
  }
  if (form.recorrente) {
    const grupo = makeId("g");
    const day = form.data.slice(8,10);
    const base = ym(form.data);
    const ate = (form.recorrAte && form.recorrAte >= base) ? form.recorrAte : addM(base,5);
    const months = Math.max(1,monthsBetween(base,ate));
    for (let i=0;i<months;i++) {
      const month = addM(base,i);
      STATE.txs.push({
        id:nextId(),
        userId:form.userId,
        tipo:form.tipo,
        desc:form.desc,
        valor:form.valor,
        categoria:form.categoria,
        data:`${month}-${day}`,
        dataVenc:form.dataVenc ? `${month}-${form.dataVenc.slice(8,10)}` : "",
        situacao:i === 0 ? form.situacao : (form.tipo === "receita" ? "a_receber" : form.tipo === "investimento" ? "" : "a_pagar"),
        metodo:form.metodo,
        recorrGrupo:grupo,
        cartaoId:"",
        parcelaAtual:0,
        totalParcelas:0,
        grupoParc:"",
        valorTotal:0,
        caixinhaId:form.caixinhaId || "",
        subtipoInv:form.subtipoInv || "",
        updatedAt:new Date().toISOString(),
      });
    }
    return;
  }
  STATE.txs.push(normalizeTx({
    id:nextId(),
    userId:form.userId,
    tipo:form.tipo,
    desc:form.desc,
    valor:form.valor,
    categoria:form.categoria,
    data:form.data,
    dataVenc:form.dataVenc,
    situacao:form.situacao,
    metodo:form.metodo,
    caixinhaId:form.caixinhaId,
    subtipoInv:form.subtipoInv,
    updatedAt:new Date().toISOString(),
  }));
}

function cancelEdit(){

  render();
}

function deleteTx(id){

  if (!confirm("Excluir este lançamento?")) return;
  STATE.txs = STATE.txs.filter(t=>t.id !== id);
  if (!STATE.deletedTxIds.includes(id)) STATE.deletedTxIds.push(id);

function toggleSit(id){

}
function selFaturaMes(month){

}
function pagarFaturaComp(cardId,month){

  if (!card) return;

function startCardAdd(){

  STATE.cardForm = emptyCardForm();
  STATE.cardErro = "";
  STATE.showCardForm = true;
  render();
}

function startCardEdit(id){
  const card = cardById(id);
  if (!card) return;
  STATE.cardEditId = id;
  STATE.cardForm = {...card,limite:moneyDisplay(card.limite)};
  STATE.cardErro = "";
  STATE.showCardForm = true;
  STATE.aba = "cartoes";
  render();
}

function cancelCardForm(){
  STATE.cardEditId = null;
  STATE.cardForm = emptyCardForm();
  STATE.cardErro = "";
  STATE.showCardForm = false;
  render();
}

function saveCard(){
  const f = STATE.cardForm;
  const nome = f.nome.trim();
  const diaFech = toInt(f.diaFech);
  const diaVenc = toInt(f.diaVenc);
  const limite = toNumber(f.limite);
  if (!nome) { STATE.cardErro = "Informe o nome."; render(); return; }
  if (diaFech < 1 || diaFech > 31 || diaVenc < 1 || diaVenc > 31 || !Number.isFinite(limite) || limite <= 0) {
    STATE.cardErro = "Preencha fechamento, vencimento e limite corretamente.";
    render();
    return;
  }
  const card = {id:STATE.cardEditId || makeId("c"),nome,diaFech,diaVenc,limite};
  if (STATE.cardEditId) {
    const idx = STATE.cards.findIndex(c=>c.id === STATE.cardEditId);
    if (idx >= 0) STATE.cards[idx] = card;
  } else {
    STATE.cards.push(card);
  }
  persist();
  cancelCardForm();
}

function deleteCard(id){
  if (!confirm("Excluir este cartão? As transações antigas ficam preservadas.")) return;
  STATE.cards = STATE.cards.filter(c=>c.id !== id);
  if (STATE.cardDetalhe === id) STATE.cardDetalhe = null;
  persist();
  render();
}

function clearFilters(){
  STATE.filters = {q:"",tipo:"todos",status:"todos",categoria:"",metodo:"",cartao:"",mes:"todos"};
  render();
}

function addCategory(){
  const tipo = STATE.categoryForm.tipo;
  const nome = STATE.categoryForm.nome.trim();
  if (!nome) return;
  const list = STATE.settings.categories[tipo];
  if (!list.some(c=>c.toLowerCase() === nome.toLowerCase())) list.push(nome);
  STATE.categoryForm.nome = "";
  persist();
  render();
}

function removeCategory(tipo,nome){
  if (!confirm("Remover esta categoria da lista? Lançamentos antigos continuam com o mesmo nome.")) return;
  STATE.settings.categories[tipo] = STATE.settings.categories[tipo].filter(c=>c !== nome);
  persist();
  render();
}

function settingsDueDays(value){
  STATE.settings.dueDays = Math.max(1,Math.min(60,toInt(value,7)));
  persist();
  render();
}

function renameUser(id,value){
  const user = userById(id);
  if (!user) return;
  const name = String(value || "").trim();
  if (!name) { render(); return; }
  user.nome = name;
  persist();
  render();
}

function addUser(){
  const name = STATE.userForm.nome.trim();
  if (!name) return;
  STATE.settings.users.push({id:makeId("u"),nome:name});
  STATE.userForm.nome = "";
  persist();
  render();
}

function setDefaultUser(id){
  if (!userById(id)) return;
  STATE.settings.defaultUserId = id;
  persist();
  render();
}

function removeUser(id){
  if (STATE.settings.users.length <= 1) return;
  if (STATE.txs.some(t=>t.userId === id)) {
    alert("Este usuário tem lançamentos. Renomeie o usuário ou exclua/reatribua os lançamentos antes de remover.");
    return;
  }
  if (!confirm("Remover este usuário?")) return;
  STATE.settings.users = STATE.settings.users.filter(u=>u.id !== id);
  if (STATE.settings.defaultUserId === id) STATE.settings.defaultUserId = STATE.settings.users[0]?.id || DEFAULT_USERS[0].id;
  if (STATE.userView === id) {
    STATE.userView = defaultUserId();
    try { localStorage.setItem(USER_VIEW_KEY,STATE.userView); } catch(e) {}
  }
  if (STATE.form.userId === id) STATE.form.userId = newTxUserId();
  persist();
  render();
}

// ── AUTO-SYNC AO DRIVE ───────────────────────────────────────────────────────
let _syncTimer = null;
function scheduleSync(){
  if (!GAUTH.signedIn) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToDrive, 4000);
}

function clearAllData(){
  if (!confirm("Apagar todos os dados? Esta ação não pode ser desfeita.")) return;
  STATE.txs = [];
  STATE.cards = [];
  STATE.investments = [];
  STATE.settings = defaultSettings();
  STATE.userView = defaultUserId();
  STATE.form = emptyForm(newTxUserId());
  try { localStorage.setItem(USER_VIEW_KEY,STATE.userView); } catch(e) {}
  STATE.configMsg = "Dados apagados. Sincronizando com o Drive…";
  persist();
  render();
}

async function registerPwa(){
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    try { await navigator.serviceWorker.register("./sw.js"); }
    catch (err) { console.warn("Service worker não registrado.",err); }
  }
}

function _updateDarkBtn(isDark){
  document.querySelectorAll("[data-dark-thumb]").forEach(el=>el.style.transform = isDark ? "translateX(13px)" : "none");
  document.querySelectorAll("[data-dark-track]").forEach(el=>el.style.background = isDark ? "var(--blue)" : "var(--line)");
  document.querySelectorAll("[data-dark-label]").forEach(el=>el.textContent = isDark ? "Tema escuro" : "Tema claro");
}
function toggleDark(){
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  try { localStorage.setItem("cf_theme", isDark ? "light" : "dark"); } catch(e){}
  _updateDarkBtn(!isDark);
}
function initTheme(){
  let theme = "light";
  try { theme = localStorage.getItem("cf_theme") || "light"; } catch(e){}
  document.documentElement.setAttribute("data-theme", theme);
  requestAnimationFrame(()=>_updateDarkBtn(theme==="dark"));
}
function boot(){
  initTheme();
  try { window.matchMedia("(max-width:760px)").addEventListener("change", ()=>render()); } catch(e){}
  const data = loadState();
  STATE.txs = data.txs;
  STATE.cards = data.cards;
  STATE.investments = data.investments || [];
  STATE.settings = data.settings;
  STATE.deletedTxIds = data.deletedTxIds || [];
  STATE.userView = normalizeUserView(STATE.userView);
  try { localStorage.setItem(USER_VIEW_KEY,STATE.userView); } catch(e) {}
  STATE.form = emptyForm(newTxUserId());
  render();
  hideSplash();
  registerPwa();
  tryInitGoogleAuth();
}

function hideSplash(){
  const splash = document.getElementById("splash");
  if (!splash) return;
  splash.style.opacity = "0";
  splash.style.visibility = "hidden";
  setTimeout(()=>splash.remove(),400);
}

window.addEventListener("beforeunload", e => {
  if (STATE.dirty && GAUTH.signedIn) { e.preventDefault(); e.returnValue = ""; }
});

if (document.readyState === "loading") document.addEventListener("DOMContentLoaded",boot);
else boot();
</script>
